services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roomcompass_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roomcompass_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - RoomCompass.env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: roomcompass_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=roomcompass
      - POSTGRES_USER=roomcompass
      - POSTGRES_PASSWORD=roomcompass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis: 
  # Redis：高速な一時データ保存用
  # 主に消えても再生成できるデータを扱う
    image: redis:7-alpine
    container_name: roomcompass_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: